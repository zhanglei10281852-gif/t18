version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: agri-water-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: agri_water
      MYSQL_USER: agri_user
      MYSQL_PASSWORD: agri_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: agri-water-backend
    ports:
      - "9174:9174"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=agri_user
      - DB_PASSWORD=agri_pass
      - DB_NAME=agri_water
      - SECRET_KEY=agri-water-secret-key-2024
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: agri-water-frontend
    ports:
      - "6912:6912"
    environment:
      - VITE_API_BASE_URL=http://localhost:9174
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mysql_data:
